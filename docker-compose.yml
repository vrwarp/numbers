# Example deployment for a Synology NAS / Raspberry Pi / small VPS.
# Copy .env.example to .env, fill it in, then: docker compose up -d
services:
  numbers:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      FIREBASE_API_KEY: ${FIREBASE_API_KEY:-}
      FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_APP_ID: ${FIREBASE_APP_ID:-}
      # Push notifications (docs/PUSH_SETUP.md). The service-account JSON is
      # multi-line — put it in <data>/config.json (or Admin -> Settings), not here.
      FIREBASE_MESSAGING_SENDER_ID: ${FIREBASE_MESSAGING_SENDER_ID:-}
      FIREBASE_VAPID_PUBLIC_KEY: ${FIREBASE_VAPID_PUBLIC_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-3.1-flash-lite}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      # Extra node flags for very old CPUs (e.g. an Atom without AVX). Leave
      # empty; set NODE_ARGS=--jitless only if the container still exits with
      # SIGILL after the sharp rebuild that ships in the image.
      NODE_ARGS: ${NODE_ARGS:-}
      # Run as a non-root user so /data files are owned by your host user
      # instead of root. Set to your host uid/gid (Synology: `id <user>`).
      # Leave empty to keep the root default.
      PUID: ${PUID:-}
      PGID: ${PGID:-}
    restart: unless-stopped
