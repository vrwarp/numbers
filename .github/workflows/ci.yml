name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: "E2E: ${{ matrix.engine }} (desktop + mobile)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: [chromium, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.engine }}
      - name: Run Playwright (${{ matrix.engine }}-desktop + ${{ matrix.engine }}-mobile)
        run: npm run test:e2e
        env:
          E2E_BROWSERS: ${{ matrix.engine }}
          E2E_FORCE_BUILD: "1"
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.engine }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # E-sign against the REAL Firestore backend (docs/agent/TESTING.md):
  # LetUsMeet's pattern — a Docker image with Playwright + Java runs the full
  # multi-device suite under `firebase emulators:exec` with the production
  # firestore.rules. No ESIGN_MOCK anywhere in this job.
  esign-e2e:
    name: "E-sign E2E: real Firestore backend (Docker + emulators)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Firebase emulator jars
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('firebase.json') }}
      - name: Build the e2e image
        run: docker build -t numbers-esign-e2e -f Dockerfile.e2e .
      - name: Run the e-sign suite in the container
        run: |
          mkdir -p ~/.cache/firebase/emulators playwright-report-esign test-results-esign
          docker run --rm -e CI=true \
            -v ~/.cache/firebase/emulators:/root/.cache/firebase/emulators \
            -v "$PWD/playwright-report-esign:/app/playwright-report-esign" \
            -v "$PWD/test-results-esign:/app/test-results-esign" \
            numbers-esign-e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-esign
          path: |
            playwright-report-esign/
            test-results-esign/
          retention-days: 7
