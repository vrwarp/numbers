name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  e2e:
    name: "E2E: ${{ matrix.engine }} (desktop + mobile)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: [chromium, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.engine }}
      - name: Run Playwright (${{ matrix.engine }}-desktop + ${{ matrix.engine }}-mobile)
        run: npm run test:e2e
        env:
          E2E_BROWSERS: ${{ matrix.engine }}
          E2E_FORCE_BUILD: "1"
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.engine }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
