name: Docker

# PRs get a dry-run image build (nothing pushed); merges to main build and
# push to Docker Hub. Requires repository secrets:
#   DOCKERHUB_USERNAME — Docker Hub account
#   DOCKERHUB_TOKEN    — access token with write scope
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: ${{ github.event_name == 'push' && 'Build & push image' || 'Build image (dry run)' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (dry run)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: numbers:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/numbers:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/numbers:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
